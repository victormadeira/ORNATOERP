<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Ornato</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ═══════ TOPBAR ═══════ -->
  <header class="topbar" id="topbar">
    <!-- Brand -->
    <div class="topbar-brand">
      <div class="brand-mark" id="brandMark">
        <!-- Logo Ornato (SVG inline) -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3.75a8.25 8.25 0 1 0 0 16.5 8.25 8.25 0 0 0 0-16.5z" stroke-width="2"/>
          <path d="M8.4 9.25h7.2M8.4 12h7.2M8.4 14.75h5.4" stroke-width="1.55"/>
        </svg>
      </div>
      <span class="brand-name" id="brandName">Ornato</span>
    </div>

    <!-- Breadcrumb projeto + ambiente picker -->
    <div class="breadcrumb" id="breadcrumb"></div>

    <!-- Direita: utilitários globais -->
    <div class="topbar-right">
      <span class="sync-dot" id="syncDot" data-status="online" title="Sincronizado">
        <span></span>
      </span>
      <button class="icon-btn" id="btnRefresh" title="Atualizar do projeto SketchUp (R)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>
        </svg>
      </button>
      <button class="icon-btn" id="btnFocus" title="Modo Foco (F)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
      <button class="icon-btn" id="btnConfig" title="Configurações globais (⌘,)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button class="search-btn" id="btnSearch" title="Buscar (⌘K)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <span class="search-label">Buscar</span>
        <kbd>⌘K</kbd>
      </button>
    </div>
  </header>

  <!-- ═══════ BODY ═══════ -->
  <div class="body">
    <!-- Sidebar de navegação principal -->
    <nav class="nav-sidebar" id="navSidebar"></nav>

    <!-- Submenu contextual (≥520px) -->
    <aside class="submenu" id="submenu"></aside>

    <!-- Main content -->
    <main class="main" id="main"></main>

    <!-- Inspector (toggle, ≥720px default) -->
    <aside class="inspector" id="inspector"></aside>
  </div>

  <!-- ═══════ STATUS BAR ═══════ -->
  <footer class="statusbar" id="statusbar"></footer>

  <!-- ═══════ OVERLAYS ═══════ -->
  <div class="overlay" id="overlayCommandPalette" hidden></div>
  <div class="overlay" id="overlayConfig" hidden></div>
  <div class="overlay" id="overlayComposicao" hidden></div>
  <div class="overlay-anchor" id="overlayConflicts" hidden></div>

  <script src="app.js" type="module"></script>
</body>
</html>
