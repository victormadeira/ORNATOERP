<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Título/descrição priorizam o público externo (landing pública).
    Para usuários logados no ERP, o React ajusta document.title dinamicamente após o boot.
    Para bots de preview (WhatsApp/FB/Twitter/Google) que não executam JS, esses meta tags
    aqui são a única fonte de verdade — por isso valem a landing.
  -->
  <title>Marcenaria sob medida em São Luís MA | Studio Ornato</title>
  <meta name="description" content="Móveis planejados e marcenaria de alto padrão em São Luís. Cozinhas, closets, home offices e ambientes sob medida — do briefing à instalação. Orçamento pelo WhatsApp." />
  <meta name="theme-color" content="#1A1614" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="canonical" href="https://studioornato.com.br/" />
  <!-- Open Graph (WhatsApp, Facebook) -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:site_name" content="Studio Ornato" />
  <meta property="og:title" content="Marcenaria sob medida em São Luís MA | Studio Ornato" />
  <meta property="og:description" content="Móveis planejados e marcenaria de alto padrão em São Luís. Cozinhas, closets e home office sob medida." />
  <meta property="og:url" content="https://studioornato.com.br/" />
  <meta property="og:image" content="https://studioornato.com.br/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Marcenaria sob medida em São Luís MA | Studio Ornato" />
  <meta name="twitter:description" content="Móveis planejados e marcenaria de alto padrão em São Luís." />
  <meta name="twitter:image" content="https://studioornato.com.br/og-image.jpg" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Preload só do Inter 400/600 (crítico para LCP) — resto é carregado pelo stylesheet -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" /></noscript>
  <!-- JSON-LD: schema LocalBusiness — alimenta Google Maps, busca local e Knowledge Panel -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FurnitureStore",
    "name": "Studio Ornato",
    "description": "Marcenaria e móveis planejados sob medida de alto padrão em São Luís - MA. Cozinhas, closets, home office e ambientes exclusivos.",
    "url": "https://studioornato.com.br/",
    "image": "https://studioornato.com.br/og-image.jpg",
    "logo": "https://studioornato.com.br/og-image.jpg",
    "telephone": "+5598987015547",
    "priceRange": "$$$",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Estrada da Pindoba, 03",
      "addressLocality": "São Luís",
      "addressRegion": "MA",
      "postalCode": "65130-000",
      "addressCountry": "BR"
    },
    "openingHoursSpecification": [{
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
      "opens": "08:00",
      "closes": "18:00"
    }],
    "areaServed": {
      "@type": "City",
      "name": "São Luís"
    },
    "sameAs": []
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <!-- Fallback SEO para bots que não executam JS (Bing, DuckDuckGo, WhatsApp/LinkedIn preview, etc.) -->
  <noscript>
    <div style="max-width:800px;margin:40px auto;padding:24px;font-family:system-ui,sans-serif;line-height:1.6">

      <p><em>Para visualizar o site completo, ative o JavaScript no seu navegador.</em></p>

  </noscript>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>

</html>
