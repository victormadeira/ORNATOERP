<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ornato ERP</title>
    <style>
        body {
            width: 320px;
            padding: 14px;
            font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #1a1612;
            color: #e9edef;
            font-size: 13px;
            margin: 0;
        }
        h1 {
            font-size: 14px;
            color: #C9A96E;
            margin: 0 0 12px;
            letter-spacing: 0.5px;
        }
        label {
            display: block;
            font-size: 11px;
            color: #8696a0;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin: 10px 0 4px;
        }
        input {
            width: 100%;
            padding: 7px 9px;
            background: #111b21;
            color: #e9edef;
            border: 1px solid #2a3942;
            border-radius: 6px;
            font-size: 12px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 9px;
            background: #C9A96E;
            color: #1a1612;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            margin-top: 12px;
        }
        button:hover { filter: brightness(1.1); }
        .status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            text-align: center;
        }
        .ok { background: #22c55e20; color: #86efac; border: 1px solid #22c55e40; }
        .err { background: #ef444420; color: #fca5a5; border: 1px solid #ef444440; }
        .hint {
            font-size: 10px;
            color: #8696a0;
            margin-top: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <h1>🏛 ORNATO · ERP</h1>

    <label>URL do ERP</label>
    <input id="baseUrl" type="text" placeholder="https://gestaoornato.com">

    <label>Token de acesso</label>
    <input id="token" type="password" placeholder="Cole o token gerado no ERP">

    <button id="save">Salvar e testar</button>
    <div id="status"></div>

    <div class="hint">
        Gere seu token em <strong>ERP → Configurações → IA → Extensão Chrome</strong>. Cada pessoa deve usar o próprio token.
    </div>

    <script src="popup.js"></script>
</body>
</html>
