<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ornato ERP</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-soft: #f7f9fc;
            --bg-alt: #eef2f7;
            --border: #e5e9f0;
            --text: #1a1f2e;
            --text-soft: #5c6b82;
            --text-dim: #8a94a6;
            --primary: #1379F0;
            --primary-hover: #0f63c7;
            --accent: #C9A96E;
            --success: #16a34a;
            --danger: #dc2626;
        }
        * { box-sizing: border-box; }
        body {
            width: 340px;
            margin: 0;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
        }
        .topbar {
            padding: 18px 18px 14px;
            background: linear-gradient(135deg, var(--primary), #0a4fa0);
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255,255,255,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.4px;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .brand .t1 { font-weight: 700; font-size: 15px; line-height: 1.1; }
        .brand .t2 { font-size: 11px; opacity: 0.85; }
        .content { padding: 18px; }
        label {
            display: block;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin: 12px 0 5px;
            font-weight: 700;
        }
        label:first-of-type { margin-top: 0; }
        input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(19, 121, 240, 0.12);
        }
        .btn {
            width: 100%;
            padding: 11px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 14px;
            transition: background 0.15s, transform 0.1s, filter 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover { background: var(--primary-hover); filter: brightness(1.05); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: wait; }
        .btn.secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        .btn.secondary:hover { background: var(--bg-alt); }
        .btn.danger { background: var(--danger); }
        .btn.danger:hover { background: #b91c1c; }
        .status {
            margin-top: 12px;
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 11px;
            line-height: 1.4;
        }
        .status:empty { display: none; }
        .ok { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .hint {
            font-size: 11px;
            color: var(--text-soft);
            margin-top: 14px;
            line-height: 1.5;
            text-align: center;
        }
        .hint a { color: var(--primary); text-decoration: none; }
        .hint a:hover { text-decoration: underline; }
        .user-card {
            padding: 12px;
            background: var(--bg-soft);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }
        .user-info { flex: 1; min-width: 0; }
        .user-info .n { font-weight: 600; font-size: 13px; line-height: 1.2; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-info .e { font-size: 11px; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge-role {
            font-size: 9px;
            background: var(--accent);
            color: #fff;
            padding: 2px 7px;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.4px;
        }
        .divider { height: 1px; background: var(--border); margin: 14px 0; }
        .stat-row { display: flex; gap: 8px; margin-top: 10px; }
        .stat {
            flex: 1;
            padding: 8px 10px;
            background: var(--bg-soft);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
        }
        .stat .v { font-weight: 800; font-size: 18px; color: var(--primary); line-height: 1; }
        .stat .l { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; font-weight: 700; }
        .hide { display: none !important; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="logo">OR</div>
        <div class="brand">
            <div class="t1">Ornato ERP</div>
            <div class="t2">Extensão WhatsApp Web</div>
        </div>
    </div>

    <div class="content">
        <!-- ═════ LOGIN VIEW ═════ -->
        <div id="view-login">
            <label>URL do ERP</label>
            <input id="baseUrl" type="text" placeholder="https://gestaoornato.com" autocomplete="off">

            <label>Email</label>
            <input id="email" type="email" placeholder="seu@email.com" autocomplete="email">

            <label>Senha</label>
            <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password">

            <button class="btn" id="btn-login">Entrar</button>

            <div id="login-status" class="status"></div>

            <div class="hint">
                Use suas credenciais do ERP. A sessão fica vinculada a você.
            </div>
        </div>

        <!-- ═════ LOGGED IN VIEW ═════ -->
        <div id="view-logged" class="hide">
            <div class="user-card">
                <div class="avatar" id="user-avatar">--</div>
                <div class="user-info">
                    <div class="n" id="user-name">—</div>
                    <div class="e" id="user-email">—</div>
                </div>
                <span class="badge-role" id="user-role">—</span>
            </div>

            <div class="stat-row">
                <div class="stat">
                    <div class="v" id="stat-badge">0</div>
                    <div class="l">Escalações</div>
                </div>
                <div class="stat">
                    <div class="v" id="stat-device">—</div>
                    <div class="l">Dispositivo</div>
                </div>
            </div>

            <div class="divider"></div>

            <button class="btn secondary" id="btn-open-wa">Abrir WhatsApp Web</button>
            <button class="btn danger" id="btn-logout">Sair</button>

            <div id="logged-status" class="status"></div>

            <div class="hint">
                Dica: abra um chat no WhatsApp Web e clique no botão flutuante <strong>ORN</strong>.
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
